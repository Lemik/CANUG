<header class="site-header">
  <div class="container header-content">
    <a class="site-brand" href="{{ '/' | relative_url }}">
      <img
        class="site-logo"
        src="{{ '/assets/img/avatar/logo.png' | relative_url }}"
        alt="CANUG"
        decoding="async"
      >
      <span class="site-title">
        <span data-lang="en">Ukrainian Community in Nanaimo</span>
        <span data-lang="uk">Українська громада Нанаймо</span>
      </span>
    </a>
    <nav class="site-nav" aria-label="Primary">
      <a href="{{ '/' | relative_url }}">
        <span data-lang="en">Home</span>
        <span data-lang="uk">Головна</span>
      </a>
      <a href="{{ '/about/' | relative_url }}">
        <span data-lang="en">About</span>
        <span data-lang="uk">Про нас</span>
      </a>
      <a href="{{ '/news/' | relative_url }}">
        <span data-lang="en">News</span>
        <span data-lang="uk">Новини</span>
      </a>
      <a href="{{ '/contact/' | relative_url }}">
        <span data-lang="en">Contact</span>
        <span data-lang="uk">Контакти</span>
      </a>
    </nav>
    <div class="lang-toggle" role="group" aria-label="Language">
      <button type="button" class="lang-button" data-set-lang="en">EN</button>
      <button type="button" class="lang-button" data-set-lang="uk">UKR</button>
    </div>
  </div>
</header>
